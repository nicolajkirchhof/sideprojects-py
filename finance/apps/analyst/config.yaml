# Trade Analyst — Default Configuration

scanner:
  # CSV files come from Gmail attachments (primary) or --csv-paths (manual override)

  # Barchart CSV column mapping: barchart_column_name -> internal_field_name
  column_mapping:
    Symbol: symbol
    Latest: price
    "%Change": change_pct
    Volume: volume
    "5D %Chg": change_5d_pct
    "1M %Chg": change_1m_pct
    "3M %Chg": change_3m_pct
    "6M %Chg": change_6m_pct
    "52W %Chg": change_52w_pct
    "52W %/High": high_52w_distance_pct
    "20D RelVol": rvol_20d
    "20D ATRP": atr_pct_20d
    "% 50D MA": pct_from_50d_sma
    "BB%": bb_pct
    "5D P/C Vol": put_call_vol_5d
    "IV Pctl": iv_percentile
    "Short Int %Chg": short_interest_chg_pct
    "Days2Cover": days_to_cover
    "Market Cap, $K": market_cap_k
    "Latest Earnings": latest_earnings
    Sector: sector

  # Columns where '%' suffix should be stripped and values parsed as floats
  percent_columns:
    - change_pct
    - change_5d_pct
    - change_1m_pct
    - change_3m_pct
    - change_6m_pct
    - change_52w_pct
    - high_52w_distance_pct
    - atr_pct_20d
    - pct_from_50d_sma
    - bb_pct
    - short_interest_chg_pct
    - iv_percentile

  # Options screener CSV column mapping (separate from stock screener)
  # These CSVs contain individual option contracts, aggregated by underlying in the pipeline
  options_column_mapping:
    Symbol: symbol
    "Price~": underlying_price
    "IV Pctl": iv_percentile
    "Imp Vol": implied_vol
    "1D IV Chg": iv_chg_1d
    "5D IV Chg": iv_chg_5d
    Type: option_type
    Strike: strike
    "Exp Date": expiration
    Delta: delta
    Moneyness: moneyness
    "Vol/OI": vol_oi_ratio
    Volume: volume
    "Vol %Chg": vol_pct_chg
    "Open Int": open_interest
    "OI %Chg": oi_pct_chg
    Theta: theta
    "Exp B4 Earnings": expires_before_earnings

gmail:
  label: TradeAnalyst
  # Email classification rules: sender pattern -> category
  # Categories: scanner (has CSV), market_commentary (newsletter), research (other)
  classification:
    - sender: "@barchart.com"
      category: scanner
    # Add your newsletter senders here:
    # - sender: "@briefing.com"
    #   category: market_commentary

web_sources:
  - name: "Brooks Trading Course"
    url: "https://www.brookstradingcourse.com/price-action-trading-blog/"
    max_articles: 5

claude:
  model_scanner: claude-sonnet-4-6
  model_review: claude-opus-4-6
  max_candidates: 10
  max_trade_reviews: 5

tradelog:
  api_url: "http://localhost:5286"
  account_id: 1
