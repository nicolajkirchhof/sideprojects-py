# Trade Analyst — Default Configuration

scanner:
  # CSV files come from Gmail attachments (primary) or --csv-paths (manual override)

  # Barchart CSV column mapping: barchart_column_name -> internal_field_name
  # Adjust these when you change your Barchart scanner configuration
  column_mapping:
    Symbol: symbol
    Latest: price
    Volume: volume
    "5D %Chg": change_5d_pct
    "1M %Chg": change_1m_pct
    "52W %/High": high_52w_distance_pct
    Sector: sector

  # Columns where '%' suffix should be stripped and values parsed as floats
  percent_columns:
    - change_5d_pct
    - change_1m_pct
    - high_52w_distance_pct

gmail:
  label: TradeAnalyst
  # Email classification rules: sender pattern -> category
  # Categories: scanner (has CSV), market_commentary (newsletter), research (other)
  classification:
    - sender: "@barchart.com"
      category: scanner
    # Add your newsletter senders here:
    # - sender: "@briefing.com"
    #   category: market_commentary

web_sources:
  - name: "Brooks Trading Course"
    url: "https://www.brookstradingcourse.com/price-action-trading-blog/"
    max_articles: 5

claude:
  model_scanner: claude-sonnet-4-6
  model_review: claude-opus-4-6
  max_candidates: 10
  max_trade_reviews: 5

tradelog:
  api_url: "http://localhost:5286"
  account_id: 1
