<mat-sidenav-container class="sidenav-container h-screen">
  <mat-sidenav #drawer class="sidenav" fixedInViewport
      [attr.role]="isHandset() ? 'dialog' : 'navigation'"
      [mode]="isHandset() ? 'over' : 'side'"
      [opened]="!isHandset()">
    <mat-toolbar>Menu</mat-toolbar>
    <mat-nav-list>
      <a mat-list-item routerLink="/dashboard">Dashboard</a>
      <a mat-list-item routerLink="/trades">Trades</a>
      <a mat-list-item routerLink="/option-positions">Option Positions</a>
      <a mat-list-item routerLink="/stock-positions">Stock Positions</a>
      <a mat-list-item routerLink="/capital">Capital</a>
      <a mat-list-item routerLink="/weekly-prep">Weekly Prep</a>
      <a mat-list-item routerLink="/analytics">Analytics</a>
      <a mat-list-item routerLink="/strategy-library">Strategy Library</a>
      <a mat-list-item routerLink="/accounts">Accounts</a>
      <a mat-list-item routerLink="/settings">Settings</a>
      <a mat-list-item routerLink="/about">About</a>
    </mat-nav-list>
  </mat-sidenav>
  <mat-sidenav-content class="!flex flex-col h-full">
    <mat-toolbar color="primary">
      @if (isHandset()) {
        <button
          type="button"
          aria-label="Toggle sidenav"
          mat-icon-button
          (click)="drawer.toggle()">
          <mat-icon aria-label="Side nav toggle icon">menu</mat-icon>
        </button>
      }
      <span>Tradelog</span>
      <span class="ml-4 opacity-90 text-sm">{{ breadcrumb() }}</span>
      <span class="flex-1"></span>
      <app-account-switcher class="mr-3"></app-account-switcher>
      <app-sync-control class="mr-2"></app-sync-control>
      <button mat-icon-button
              type="button"
              class="ml-2"
              (click)="theme.toggle()"
              [matTooltip]="theme.isDark() ? 'Switch to light theme' : 'Switch to dark theme'"
              aria-label="Toggle theme">
        <mat-icon>{{ theme.isDark() ? 'light_mode' : 'dark_mode' }}</mat-icon>
      </button>
    </mat-toolbar>
    <div class="flex flex-1 flex-col">
      <router-outlet></router-outlet>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
