# Trade Analyst — Default Configuration

scanner:
  # CSV files come from Gmail attachments (primary) or --csv-paths (manual override)

  # Barchart CSV column mapping: barchart_column_name -> internal_field_name
  # Covers all three scanner schemas:
  #   Schema A (Standard / Long Universe): Trend, TTM Squeeze, BB%, 3M vs IDX, 20D ADRP, Market Cap
  #   Schema B (PEAD / EP Gap): Gap Up%(Pre), Surprise% cols, Short Float, 20D ADR (no % suffix)
  #   Schema C (Flow / Breakdown): 1M P/C Vol, Vol/OI Ratio, Short Int, 5D/1M IV Chg
  column_mapping:
    Symbol: symbol
    Latest: price
    "%Change": change_pct
    Volume: volume
    "5D %Chg": change_5d_pct
    "1M %Chg": change_1m_pct
    "3M %Chg": change_3m_pct
    "6M %Chg": change_6m_pct
    "52W %Chg": change_52w_pct
    "52W %/High": high_52w_distance_pct
    "20D RelVol": rvol_20d
    "20D ATRP": atr_pct_20d
    "20D ADRP": adr_pct_20d       # Standard view (has % suffix in some exports)
    "20D ADR": adr_pct_20d        # PEAD/EP view (no % suffix)
    "20D ADR%": adr_pct_20d       # BarchartScreeners.md canonical name
    "% 50D MA": pct_from_50d_sma
    "50D MA %Chg": slope_50d_sma  # legacy abbreviated name
    "Slope of 50D SMA": slope_50d_sma  # BarchartScreeners.md canonical name
    "200D MA %Chg": slope_200d_sma     # legacy abbreviated name
    "Slope of 200D SMA": slope_200d_sma  # BarchartScreeners.md canonical name
    "BB%": bb_pct                 # legacy Bollinger Band % field
    "Bollinger Bands Rank": bb_rank  # BarchartScreeners.md Standard + Intraday views (0–100)
    Trend: trend_seeker_signal    # legacy abbreviated name
    "Trend Seeker Signal": trend_seeker_signal  # BarchartScreeners.md canonical name
    "Wtd Alpha": weighted_alpha   # legacy abbreviated name
    "Weighted Alpha": weighted_alpha  # BarchartScreeners.md canonical name
    "5D vs IDX": perf_vs_market_5d    # legacy abbreviated name
    "Perf vs Market 5D": perf_vs_market_5d  # BarchartScreeners.md canonical name
    "1M vs IDX": perf_vs_market_1m    # legacy abbreviated name
    "Perf vs Market 1M": perf_vs_market_1m  # BarchartScreeners.md canonical name
    "3M vs IDX": perf_vs_market_3m    # legacy abbreviated name
    "3M % Change from Index": perf_vs_market_3m  # BarchartScreeners.md canonical name
    "TTM Squeeze": ttm_squeeze
    "Gap Up%(Pre)": gap_up_pct    # legacy name
    "Gap Up %": gap_up_pct        # BarchartScreeners.md canonical name
    "%Chg(Pre)": change_pre_pct   # Intraday view pre-market % change
    "Daily Closing Range": daily_closing_range  # Intraday view: 0–100 closing range
    "Short Float": short_float
    "Short Int": short_interest_k  # legacy abbreviated name
    "Short Interest, K": short_interest_k  # BarchartScreeners.md canonical name
    "Surprise%": earnings_surprise_pct  # legacy abbreviated name
    "Earnings Surprise%": earnings_surprise_pct  # BarchartScreeners.md canonical name
    "Surprise% 1-Qtr Ago": earnings_surprise_q1  # legacy abbreviated name
    "Earnings Surprise% 1-Qtr Ago": earnings_surprise_q1  # BarchartScreeners.md canonical name
    "Surprise% 2-Qtrs Ago": earnings_surprise_q2  # legacy abbreviated name
    "Earnings Surprise% 2-Qtrs Ago": earnings_surprise_q2  # BarchartScreeners.md canonical name
    "Surprise% 3-Qtrs Ago": earnings_surprise_q3  # legacy abbreviated name
    "Earnings Surprise% 3-Qtrs Ago": earnings_surprise_q3  # BarchartScreeners.md canonical name
    "5D P/C Vol": put_call_vol_5d
    "1M P/C Vol": put_call_vol_1m  # legacy abbreviated name
    "1M Put/Call Vol": put_call_vol_1m  # BarchartScreeners.md canonical name
    "IV Pctl": iv_percentile
    "5D IV Chg": iv_chg_5d
    "1M IV Chg": iv_chg_1m
    "1M Total Vol": options_vol_1m   # Options/Flow view: 1-month total options volume
    "1M Total OI": options_oi_1m     # Options/Flow view: 1-month total open interest
    "Vol/OI Ratio": vol_oi_ratio     # legacy name
    "Total Volume/OI Ratio": vol_oi_ratio  # BarchartScreeners.md canonical name
    "Short Int %Chg": short_interest_chg_pct
    "Days2Cover": days_to_cover      # legacy abbreviated name
    "Days to Cover": days_to_cover   # BarchartScreeners.md canonical name
    "Market Cap": market_cap_k       # legacy name (values in dollars despite field name)
    "Market Cap, $K": market_cap_k   # BarchartScreeners.md canonical name
    "Latest Earnings": latest_earnings
    Sector: sector

  # Columns where '%' suffix should be stripped and values parsed as floats
  percent_columns:
    - change_pct
    - change_5d_pct
    - change_1m_pct
    - change_3m_pct
    - change_6m_pct
    - change_52w_pct
    - high_52w_distance_pct
    - atr_pct_20d
    - adr_pct_20d
    - pct_from_50d_sma
    - slope_50d_sma
    - slope_200d_sma
    - bb_pct
    - gap_up_pct
    - change_pre_pct
    - short_float
    - earnings_surprise_pct
    - earnings_surprise_q1
    - earnings_surprise_q2
    - earnings_surprise_q3
    - short_interest_chg_pct
    - iv_percentile
    - iv_chg_5d
    - iv_chg_1m

  # Options screener CSV column mapping (separate from stock screener)
  # These CSVs contain individual option contracts, aggregated by underlying in the pipeline
  options_column_mapping:
    Symbol: symbol
    "Price~": underlying_price
    "IV Pctl": iv_percentile
    "Imp Vol": implied_vol
    "1D IV Chg": iv_chg_1d
    "5D IV Chg": iv_chg_5d
    Type: option_type
    Strike: strike
    "Exp Date": expiration
    Delta: delta
    Moneyness: moneyness
    "Vol/OI": vol_oi_ratio
    Volume: volume
    "Vol %Chg": vol_pct_chg
    "Open Int": open_interest
    "OI %Chg": oi_pct_chg
    Theta: theta
    "Exp B4 Earnings": expires_before_earnings

gmail:
  label: TradeAnalyst
  # Email classification rules: sender pattern -> category
  # Categories: scanner (has CSV), market_commentary (newsletter), research (other)
  classification:
    - sender: "@barchart.com"
      category: scanner
    # Add your newsletter senders here:
    # - sender: "@briefing.com"
    #   category: market_commentary

web_sources:
  - name: "Brooks Trading Course"
    url: "https://www.brookstradingcourse.com/price-action-trading-blog/"
    max_articles: 5

claude:
  model_scanner: claude-sonnet-4-6
  model_review: claude-opus-4-6
  max_candidates: 10
  max_trade_reviews: 5

tradelog:
  api_url: "http://localhost:5286"
  account_id: 1
